<script>
const canvas=document.getElementById('bg');
const ctx=canvas.getContext('2d');
let W,H,streams=[],sparks=[],scanY=0;

function resize(){
  W=canvas.width=window.innerWidth;
  H=canvas.height=window.innerHeight;
}

function init(){
  streams=[];sparks=[];
  for(let i=0;i<Math.floor(W/40);i++){
    streams.push({
      x:Math.random()*W,y:Math.random()*H,
      len:60+Math.random()*180,
      speed:0.6+Math.random()*2,
      op:0.25+Math.random()*0.45,
      w:Math.random()>0.6?1.5:0.6,
      gold:Math.random()>0.75
    });
  }
  for(let i=0;i<Math.floor(W/18);i++){
    sparks.push({
      x:Math.random()*W,y:Math.random()*H,
      r:0.8+Math.random()*2,
      speed:0.2+Math.random()*0.8,
      op:0.3+Math.random()*0.5,
      pulse:Math.random()*Math.PI*2,
      gold:Math.random()>0.6
    });
  }
}

function draw(){
  ctx.fillStyle='rgba(10,10,10,0.18)';
  ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(80,80,80,0.08)';
  ctx.lineWidth=0.5;
  const gx=Math.floor(W/60);
  const gy=Math.floor(H/60);
  for(let i=0;i<=gx;i++){const px=(i/gx)*W;ctx.beginPath();ctx.moveTo(px,0);ctx.lineTo(px,H);ctx.stroke();}
  for(let j=0;j<=gy;j++){const py=(j/gy)*H;ctx.beginPath();ctx.moveTo(0,py);ctx.lineTo(W,py);ctx.stroke();}
  scanY+=0.8;
  if(scanY>H)scanY=0;
  ctx.strokeStyle='rgba(201,137,42,0.06)';
  ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,scanY);ctx.lineTo(W,scanY);ctx.stroke();
  streams.forEach(s=>{
    s.y-=s.speed;
    if(s.y+s.len<0){s.y=H+s.len;s.x=Math.random()*W;}
    const g=ctx.createLinearGradient(s.x,s.y,s.x,s.y+s.len);
    if(s.gold){
      g.addColorStop(0,'rgba(201,137,42,0)');
      g.addColorStop(0.3,'rgba(232,169,74,'+s.op+')');
      g.addColorStop(0.7,'rgba(201,137,42,'+s.op+')');
      g.addColorStop(1,'rgba(201,137,42,0)');
    } else {
      g.addColorStop(0,'rgba(60,60,60,0)');
      g.addColorStop(0.4,'rgba(160,160,160,'+s.op+')');
      g.addColorStop(0.8,'rgba(201,137,42,'+(s.op*0.4)+')');
      g.addColorStop(1,'rgba(60,60,60,0)');
    }
    ctx.strokeStyle=g;ctx.lineWidth=s.w;
    ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(s.x,s.y+s.len);ctx.stroke();
  });
  sparks.forEach(p=>{
    p.pulse+=0.03;p.y-=p.speed;
    if(p.y<0){p.y=H;p.x=Math.random()*W;}
    const op=p.op*(0.5+0.5*Math.sin(p.pulse));
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=p.gold?'rgba(201,137,42,'+op+')':'rgba(180,180,180,'+op+')';
    ctx.fill();
  });
  requestAnimationFrame(draw);
}

resize();init();
window.addEventListener('resize',()=>{resize();init();});
requestAnimationFrame(draw);
</script>
